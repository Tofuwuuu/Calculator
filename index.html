<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="calculator" aria-label="Calculator">
      <div class="display-stack">
        <div class="display-ans" id="display-ans">Ans = 0</div>
        <output class="display display-main" id="display" aria-live="polite" aria-atomic="true">0</output>
      </div>
      <div class="keypad" role="group" aria-label="Keypad">
        <button type="button" class="key key-fn" data-action="clear">C</button>
        <button type="button" class="key key-fn" data-action="backspace" aria-label="Backspace">⌫</button>
        <button type="button" class="key key-op" data-operator="divide" aria-label="Divide">÷</button>
        <button type="button" class="key key-op" data-operator="multiply" aria-label="Multiply">×</button>

        <button type="button" class="key" data-digit="7">7</button>
        <button type="button" class="key" data-digit="8">8</button>
        <button type="button" class="key" data-digit="9">9</button>
        <button type="button" class="key key-op" data-operator="subtract" aria-label="Subtract">−</button>

        <button type="button" class="key" data-digit="4">4</button>
        <button type="button" class="key" data-digit="5">5</button>
        <button type="button" class="key" data-digit="6">6</button>
        <button type="button" class="key key-op" data-operator="add" aria-label="Add">+</button>

        <button type="button" class="key" data-digit="1">1</button>
        <button type="button" class="key" data-digit="2">2</button>
        <button type="button" class="key" data-digit="3">3</button>
        <button type="button" class="key key-equals" data-action="equals">=</button>

        <button type="button" class="key key-zero" data-digit="0">0</button>
        <button type="button" class="key" data-action="decimal">.</button>
        <span class="keypad-spacer" aria-hidden="true"></span>
      </div>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
